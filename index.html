<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/streakboard_logo.png?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreakBoard — Track your real streaks</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS splash + icon (for iPhone home screen install) -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- PWA + Mobile App Meta Tags -->
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StreakBoard" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="StreakBoard" />

  <!-- Open Graph (WhatsApp / Twitter / Slack link previews) -->
  <meta property="og:title" content="StreakBoard — A contribution graph for your real life" />
  <meta property="og:description" content="Track what you do. Not what you plan. Free habit streak tracker." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://streak-o.vercel.app" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="StreakBoard" />
  <meta name="twitter:description" content="Track what you do. Not what you plan." />

  <!-- SEO -->
  <meta name="description" content="StreakBoard — Track your daily habits with a 30-day streak calendar. Free forever. No credit card." />
  <meta name="keywords" content="habit tracker, streak tracker, daily habits, consistency, StreakBoard" />

  <!-- Anti-flash: apply dark class before React renders -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
